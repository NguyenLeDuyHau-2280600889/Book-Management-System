<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User List</title>
<th:block th:replace="~{layout::app-css}"></th:block>
</head>
<body>
<th:block th:replace="~{layout::header}"></th:block>
<div class="page">
<div class="panel">
<h1>Danh sách người dùng</h1>
<table class="table">
<thead>
<tr>
<th>Id</th>
<th>Username</th>
<th>Email</th>
<th>Role</th>
<th>Created At</th>
<th>Action</th>
</tr>
</thead>
<tbody>
<tr th:each="user : ${users}">
<td th:text="${user.getId()}"></td>
<td th:text="${user.getUsername()}"></td>
<td th:text="${user.getEmail()}"></td>
<td th:text="${user.getRole()}"></td>
<td th:text="${user.getCreatedAt()}"></td>
<td>
<form th:action="@{/users/delete/{id}(id=${user.getId()})}" method="post" style="display:inline;" th:if="${user.getUsername() != 'admin'}">
<button class="btn btn-danger btn-small" type="submit" onclick="return confirm('Are you sure?')">Delete</button>
</form>
</td>
</tr>
</tbody>
</table>
</div>
</div>
<th:block th:replace="~{layout::footer}"></th:block>
</body>
</html>
