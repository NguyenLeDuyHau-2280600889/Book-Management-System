<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Danh muc</title>
<th:block th:replace="~{layout::app-css}"></th:block>
</head>
<body>
<th:block th:replace="~{layout::header}"></th:block>
<div class="page">
<div class="panel">
<h1>Quan ly danh muc</h1>
<p class="subtitle">Them, sua va xoa danh muc sach.</p>

<p class="error" th:if="${error}" th:text="${error}"></p>

<div class="cart-actions">
<a class="btn btn-primary" href="/categories/add">Them danh muc</a>
</div>

<div th:if="${#lists.isEmpty(categories)}">
<p>Chua co danh muc nao.</p>
</div>

<table class="table" th:if="${!#lists.isEmpty(categories)}">
<thead>
<tr>
<th>ID</th>
<th>Ten danh muc</th>
<th>Thao tac</th>
</tr>
</thead>
<tbody>
<tr th:each="category : ${categories}">
<td th:text="${category.id}"></td>
<td th:text="${category.name}"></td>
<td>
<a class="btn btn-outline btn-small" th:href="@{/categories/edit/{id}(id=${category.id})}">Sua</a>
<form th:action="@{/categories/delete/{id}(id=${category.id})}" method="post" style="display:inline;">
<button class="btn btn-danger btn-small" type="submit" onclick="return confirm('Ban co chac muon xoa danh muc nay?')">Xoa</button>
</form>
</td>
</tr>
</tbody>
</table>
</div>
</div>
<th:block th:replace="~{layout::footer}"></th:block>
</body>
</html>
