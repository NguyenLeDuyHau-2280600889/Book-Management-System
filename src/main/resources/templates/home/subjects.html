<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Danh sách môn học</title>
  <th:block th:replace="~{layout::app-css}"></th:block>
</head>
<body>
  <th:block th:replace="~{layout::header}"></th:block>
  <div class="page">
    <div class="panel">
      <h1>Danh sách môn học</h1>
      <p class="subtitle">Tổng hợp các môn học tiêu biểu.</p>

      <div class="form-grid">
        <div th:each="subject : ${subjects}">
          <img th:src="${subject.imageUrl}" alt="Ảnh môn học" width="120" height="120">
          <div>
            <strong th:text="${subject.code}"></strong>
            <span> - </span>
            <span th:text="${subject.name}"></span>
          </div>
        </div>
      </div>
    </div>
  </div>
  <th:block th:replace="~{layout::footer}"></th:block>
</body>
</html>
