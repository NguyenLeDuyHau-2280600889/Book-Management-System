<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liên hệ</title>
  <th:block th:replace="~{layout::app-css}"></th:block>
</head>
<body>
  <th:block th:replace="~{layout::header}"></th:block>
  <div class="page">
    <div class="panel">
      <h1>Liên hệ</h1>
      <p class="subtitle">Gửi thông tin để chúng tôi hỗ trợ nhanh nhất.</p>

      <form action="/contact" method="post">
        <div class="form-grid">
          <div>
            <label for="fullName">Họ Tên</label>
            <input id="fullName" name="fullName" type="text" required>
          </div>
          <div>
            <label for="email">Email</label>
            <input id="email" name="email" type="email" required>
          </div>
          <div>
            <label for="message">Tin nhắn</label>
            <textarea id="message" name="message" rows="4" required></textarea>
          </div>
          <div>
            <label for="sentDate">Ngày Gửi</label>
            <input id="sentDate" name="sentDate" type="date" th:value="${sentDate}" required>
          </div>
        </div>
        <button type="submit">Gửi thông tin</button>
      </form>
    </div>
  </div>
  <th:block th:replace="~{layout::footer}"></th:block>
</body>
</html>
