<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chỉnh sửa đơn hàng</title>
<th:block th:replace="~{layout::app-css}"></th:block>
</head>
<body>
<th:block th:replace="~{layout::header}"></th:block>
<div class="page">
<div class="panel">
<h1>Chỉnh sửa đơn hàng</h1>
<p class="subtitle">Cập nhật số lượng từng sản phẩm.</p>

<div class="cart-total">
<strong>Mã đơn:</strong> <span th:text="${order.id}"></span>
<span style="margin-left: 16px;"><strong>Khách hàng:</strong> <span th:text="${order.user.username}"></span></span>
<span style="margin-left: 16px;"><strong>Ngày đặt:</strong> <span th:text="${#temporals.format(order.createdAt, 'dd/MM/yyyy HH:mm')}"></span></span>
</div>

<form th:action="@{/orders/edit/{id}(id=${order.id})}" th:object="${form}" method="post">
<table class="table">
<thead>
<tr>
<th>Sách</th>
<th>Đơn giá</th>
<th>Số lượng</th>
</tr>
</thead>
<tbody>
<tr th:each="item, iter : *{items}">
<td th:text="${item.bookTitle}"></td>
<td th:text="${item.price}"></td>
<td>
<input type="hidden" th:field="*{items[__${iter.index}__].id}">
<input type="number" min="1" th:field="*{items[__${iter.index}__].quantity}">
</td>
</tr>
</tbody>
</table>
<button type="submit">Lưu thay đổi</button>
</form>
<br>
<a class="btn btn-outline btn-small" th:href="@{/orders}">Quay lại lịch sử</a>
</div>
</div>
<th:block th:replace="~{layout::footer}"></th:block>
</body>
</html>
