<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cấu hình mã QR</title>
<th:block th:replace="~{layout::app-css}"></th:block>
</head>
<body>
<th:block th:replace="~{layout::header}"></th:block>
<div class="page">
<div class="panel">
<h1>Cấu hình mã QR thanh toán</h1>
<p class="subtitle">Tải ảnh QR mới để hiển thị ở trang thanh toán.</p>

<p class="error" th:if="${error}" th:text="${error}"></p>
<p class="badge" th:if="${success}" th:text="${success}"></p>

<div class="payment-qr" th:if="${paymentQrImage != null and !#strings.isEmpty(paymentQrImage)}">
<h3>QR hiện tại</h3>
<img th:src="${paymentQrImage}" alt="Mã QR hiện tại">
</div>

<form th:action="@{/admin/payment-qr}" method="post" enctype="multipart/form-data">
<div class="form-grid">
<div>
<label for="qrFile">Ảnh mã QR (tuỳ chọn khi chỉ sửa ghi chú)</label>
<input id="qrFile" type="file" name="qrFile" accept="image/*">
</div>
<div>
<label for="paymentQrNote">Nội dung chuyển khoản</label>
<textarea id="paymentQrNote" name="paymentQrNote" rows="3" placeholder="Ví dụ: Nguyen Van A - SDT 09xx..."
          th:text="${paymentQrNote}"></textarea>
</div>
</div>
<button type="submit">Lưu cấu hình QR</button>
</form>
</div>
</div>
<th:block th:replace="~{layout::footer}"></th:block>
</body>
</html>
